on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_NUMBER_OFFSET: 0

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.v.outputs.name }}
      build-number: ${{ steps.bn.outputs.number }}
    steps:
      - id: v
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: bn
        run: echo "number=$(( ${{ github.run_number }} + ${{ env.BUILD_NUMBER_OFFSET }} ))" >> "$GITHUB_OUTPUT"

  build_windows:
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v7

      - name: Install FVM
        run: choco install fvm

      - name: Install Flutter SDK
        run: fvm install

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Build for Windows
        run: fvm flutter build windows --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}

      - name: Compress archive
        id: compress
        shell: pwsh
        run: |
          $FILENAME="dqm_installer_flt_${BUILD_NAME}_windows.zip"
          echo "FILENAME=$FILENAME" >> "${env:GITHUB_OUTPUT}"
          
          # Copy Visual C++ runtime libraries
          Copy-Item .\windows\vcredist\* .\build\windows\x64\runner\Release\
          cd build\windows\x64\runner
          Move-Item -Path Release -Destination dqm_installer_flt
          Compress-Archive -DestinationPath ..\..\..\..\$FILENAME -Path dqm_installer_flt
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.compress.outputs.FILENAME }}

  build_macos:
    runs-on: macos-26
    needs: prepare
    steps:
      - uses: actions/checkout@v7

      - name: Install Flutter SDK
        uses: chika3742/setup-fvm@v3

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Init Provisioning Profile and Certificate
        working-directory: macos
        run: bundle exec fastlane match --readonly

      - name: Build (Archive) for macOS
        run: |
          fvm flutter build macos --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}

      - name: Create DMG image
        run: ./macos/scripts/create_dmg_image.sh $BUILD_NAME
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}

      - name: Notarize
        working-directory: macos
        run: bundle exec fastlane notarize
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ISSUER }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_VERSION: ${{ needs.prepare.outputs.build-name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/macos/notarized/*.dmg

  build_linux:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v7

      - name: Install Flutter SDK
        uses: chika3742/setup-fvm@v3

      - name: Install apt dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get install -y ninja-build libgtk-3-dev
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O yq
          chmod +x ./yq

      - name: Install pub dependencies
        run: fvm flutter pub get

      - name: Build for Linux
        run: fvm flutter build linux --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}

      - name: Package
        run: |
          cd build/linux/x64/release
          mv bundle dqm_installer_flt
          zip -r dqm_installer_flt_${BUILD_NAME}_linux.zip ./dqm_installer_flt
        env:
          BUILD_NAME: ${{ needs.prepare.outputs.build-name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/linux/x64/release/dqm_installer_flt_*.zip
